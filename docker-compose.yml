version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: url-shortener-db
    environment:
      POSTGRES_USER: shortener_user
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U shortener_user -d url_shortener" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: